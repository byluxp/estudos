
<html>
    <body>
        <div id="d1">Conteudo Original</div>
        <button onClick="alterar()">Clique aqui</button>
        <script> <!-- A partir daqui, tudo é javascript-->
            const alterar = () => {
                let d1 = document.getElementById("d1") <!-- especificando o que eu vou alterar - o elemento de id "d1"-->
                d1.innerHTML="Conteudo Alterado" <!-- alterando a escrita com js-->
                d1.style.background="yellow" <!-- alterando a cor do background com js-->
            }
        </script>
    </body>
</html>
